<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Оплата прошла успешно | Психологический Чекап</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,700;1,600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-main: #1A1210;
    --bg-card: #251A17;
    --terracotta: #C4704A;
    --almond: #D4B896;
    --beige: #EDE0D0;
    --gold: #C9A96E;
    --light-gray: #7A6F6A;
    --text-sub: #A89A90;
    --border: rgba(255,255,255,0.07);
  }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg-main);
    color: var(--beige);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    position: relative;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 700px;
    background: radial-gradient(circle, rgba(196,112,74,0.09) 0%, transparent 65%);
    border-radius: 50%;
    pointer-events: none;
  }
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 28px;
    padding: 56px 48px 52px;
    max-width: 520px;
    width: 100%;
    text-align: center;
    position: relative;
    overflow: hidden;
    box-shadow: 0 32px 80px rgba(0,0,0,0.45);
    animation: fadeUp .5s ease both;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(196,112,74,0.5), transparent);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .icon-wrap {
    width: 72px;
    height: 72px;
    background: rgba(196,112,74,0.12);
    border: 1px solid rgba(196,112,74,0.3);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 28px;
  }
  .icon-wrap svg { width: 32px; height: 32px; }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.7rem, 4vw, 2.2rem);
    color: var(--beige);
    line-height: 1.2;
    margin-bottom: 16px;
  }
  .divider {
    width: 48px;
    height: 1px;
    background: var(--terracotta);
    opacity: 0.5;
    margin: 0 auto 28px;
  }
  .body-text {
    font-size: .95rem;
    color: var(--text-sub);
    line-height: 1.85;
    max-width: 400px;
    margin: 0 auto;
  }
  .note {
    font-size: .82rem;
    color: var(--light-gray);
    margin-top: 20px;
    line-height: 1.7;
  }
  .note a {
    color: var(--light-gray);
    text-decoration: underline;
    text-decoration-color: rgba(122,111,106,0.4);
    transition: color .2s;
  }
  .note a:hover { color: var(--almond); }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 36px;
    font-size: .82rem;
    color: var(--light-gray);
    text-decoration: none;
    transition: color .2s;
  }
  .back-link:hover { color: var(--almond); }
  .back-link svg { width: 14px; height: 14px; }
  footer {
    margin-top: 32px;
    font-size: .75rem;
    color: var(--light-gray);
    opacity: 0.6;
    text-align: center;
  }
  @media (max-width: 560px) {
    .card { padding: 40px 24px 36px; }
    h1 { font-size: 1.55rem; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="icon-wrap">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="16" cy="16" r="15" stroke="#C4704A" stroke-width="1.5"/>
      <path d="M9 16.5l5 5 9-9" stroke="#C9A96E" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>

  <h1>Оплата прошла успешно!</h1>
  <div class="divider"></div>

  <p class="body-text">
    Мы уже отправили ссылку для входа в закрытый канал курса
    «Психологический Чекап» в ваш Telegram-бот
    <strong style="color:var(--almond)">@PsyAuditBot</strong>.
  </p>

  <p class="note">
    Если сообщение не пришло — напишите нам:<br>
    <a href="mailto:info_malikova@internet.ru">info_malikova@internet.ru</a>
  </p>

  <a href="/" class="back-link">
    <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    Вернуться на сайт
  </a>
</div>

<footer>© 2025 Светлана Маликова · Психологический Чекап</footer>

</body>
</html>
